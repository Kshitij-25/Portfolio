<!DOCTYPE html>
<html>
<head>
  <base href="/Portfolio/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kshitij Passi — Software Engineer building beautiful cross-platform experiences with Flutter.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Kshitij Passi — Software Engineer</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* Splash shown before the Flutter engine boots. Mirrors the dark theme so
       there is no white flash, then fades out once main() paints. */
    html, body { margin: 0; padding: 0; height: 100%; background: #07080C; }
    #boot {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #07080C; z-index: 9999;
      transition: opacity .5s ease; font-family: system-ui, sans-serif;
    }
    #boot.hide { opacity: 0; pointer-events: none; }
    .boot-mark {
      width: 54px; height: 54px; border-radius: 16px;
      background: linear-gradient(135deg, #5B8CFF, #B98CFF);
      box-shadow: 0 20px 60px -16px rgba(124,92,255,.6);
      animation: pulse 1.4s cubic-bezier(.22,1,.36,1) infinite alternate;
    }
    @keyframes pulse { to { transform: translateY(-8px) scale(1.06); } }
  </style>
</head>
<body>
  <div id="boot"><div class="boot-mark"></div></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var b = document.getElementById('boot');
      if (b) { b.classList.add('hide'); setTimeout(function(){ b.remove(); }, 600); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
